name: UPPCL Tracker - Hourly at Minute 2

on:
  schedule:
    # Run at minute 2 of every hour (00:02, 01:02, 02:02, etc.)
    - cron: '2 * * * *'
  workflow_dispatch:

jobs:
  uppcl-tracker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium beautifulsoup4 gspread google-auth-oauthlib google-auth-httplib2
      
      - name: Create service account JSON file
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json
      
      - name: Run UPPCL Tracker
        run: |
          python uppcl_google_sheets_tracker_v3_6.py --once
        env:
          UPPCL_USERNAME: ${{ secrets.UPPCL_USERNAME }}
          UPPCL_PASSWORD: ${{ secrets.UPPCL_PASSWORD }}
          GOOGLE_SHEETS_NAME: 'UPPCL Consumption Tracker'
          USE_SYSTEM_CHROME: 'true'
      
      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uppcl-tracker-logs
          path: uppcl_tracker.log
          retention-days: 7
