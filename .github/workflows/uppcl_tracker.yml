name: UPPCL Tracker - Hourly Schedule

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  uppcl-tracker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create service account JSON
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json
      
      - name: Run UPPCL Tracker
        run: |
          python uppcl_google_sheets_tracker_v3_6.py --once
        env:
          UPPCL_USERNAME: ${{ secrets.UPPCL_USERNAME }}
          UPPCL_PASSWORD: ${{ secrets.UPPCL_PASSWORD }}
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uppcl-tracker-logs
          path: uppcl_tracker.log
          retention-days: 7
